name = "brouter-runtime"
main = "src/index.ts"
compatibility_date = "2025-04-01"
workers_dev = true

[ai]
binding = "AI"

[[durable_objects.bindings]]
name = "COMPUTE_EXECUTOR"
class_name = "ComputeExecutor"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["ComputeExecutor"]

# Optional: Create KV namespace in Cloudflare dashboard for persistent rate limiting
# Dashboard → Workers & Pages → KV → Create namespace "brouter-rate-limit"
# Then uncomment and add the ID below
# [[kv_namespaces]]
# binding = "RATE_LIMIT_KV"
# id = "YOUR_KV_NAMESPACE_ID_HERE"
